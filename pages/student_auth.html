  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #050505; /* Deep dark theme */
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      background: #0a0a0a;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 28px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
      z-index: 10;
      margin: 40px 0;
    }

    /* Subtle neon hover glow background */
    .glow-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120%;
      height: 120%;
      background: radial-gradient(circle at center, rgba(16, 185, 129, 0.12) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
      z-index: 0;
      border-radius: 50%;
    }
    
    .auth-card:hover .glow-bg {
      opacity: 1;
    }

    .content {
      position: relative;
      z-index: 2;
    }

    .header { text-align: center; margin-bottom: 30px; }
    .header h1 {
      font-family: 'Fraunces', serif;
      font-size: 2.1rem;
      font-weight: 300;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
      color: #fff;
    }
    .header p { color: rgba(255, 255, 255, 0.4); font-size: 0.9rem; }

    .btn-google {
      width: 100%;
      background: #fff;
      color: #000;
      border: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.2s ease;
      margin-top: 20px;
    }
    .btn-google:hover {
      background: #f1f5f9;
      transform: translateY(-2px);
    }
    .btn-google.loading {
      opacity: 0.8;
      pointer-events: none;
    }
    .spin {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(0,0,0,0.1);
      border-top-color: #000;
      border-radius: 50%;
      animation: rp 0.8s linear infinite;
    }
    @keyframes rp { to { transform: rotate(360deg); } }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .alert.ok {
      background: rgba(16, 185, 129, 0.1);
      color: #34d399;
      border-color: rgba(16, 185, 129, 0.2);
    }
    .alert.hidden {
      display: none;
    }
    
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.4);
      line-height: 1.6;

    .footer a {

      transition: color 0.2s;
    }
    .footer a:hover {
      color: #fff;
    }

<body>

<div class="auth-card">
  <div class="glow-bg"></div>
  
  <div class="content">
    <div class="header">
      <h1 id="headerTitle">Welcome</h1>
      <p id="headerSub">Access your account to continue</p>
    </div>

    <div class="alert hidden" id="alert"><span id="alertIcon">⚠️</span><span id="alertMsg"></span></div>

    <!-- SHARED FOOTER (Google & Links) -->
    <div id="authFooter">

      <button class="btn-google" id="googleBtn" onclick="doGoogle()">
        <svg id="googleIcon" width="20" height="20" viewBox="0 0 24 24" style="position:relative; z-index:2;">
          <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        <span id="btnText" style="position:relative; z-index:2;">Continue with Google</span>
      </button>

      <div class="footer">
        By continuing, you agree to our <br/>
        <a href="#">Terms of Service</a> &middot; <a href="#">Privacy Policy</a>
        <br/>
        <a href="/" class="back-link">← Back to platform</a>
      </div>
    </div>
  </div>
</div>

<script>
// Instantly show loading state if returning from OAuth redirect
if (window.location.hash.includes('access_token') || window.location.search.includes('code')) {
  document.getElementById('headerTitle').textContent = 'Authenticating...';
  document.getElementById('headerSub').textContent = 'Please wait while we log you in.';
  document.getElementById('authFooter').style.display = 'none';
  
  // Add a spinner to the header
  const spinner = document.createElement('div');
  spinner.className = 'spin';
  spinner.style.margin = '20px auto 0';
  document.querySelector('.header').appendChild(spinner);
}

// Supabase initialization
const SB_URL = 'https://qbrdfnhksqoaagstvdzk.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFicmRmbmhrc3FvYWFnc3R2ZHprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3ODc5NDcsImV4cCI6MjA4ODM2Mzk0N30.GHhXkO63AMUrRSUHW9GtjD27AjBDZ1PIsfeBWRgNqgQ';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

// Helper: detect if we are inside an iframe (the auth modal)
const isInsideIframe = window.self !== window.top;

// Auto-redirect if already logged in and initialize user if needed
(async () => {
  try {
    const { data: { session }, error } = await sb.auth.getSession();
    if (error) throw error;
    
    if (session) {
      try {
        const { data } = await sb.from('users').select('role').eq('id', session.user.id).single();
        
        // If no row exists, create initial student profile from Google data
        if (!data) {
          const meta = session.user.user_metadata || {};
          const displayName = meta.name || meta.full_name || session.user.email?.split('@')[0] || 'Student';
          
          await sb.from('users').upsert({
            id: session.user.id,
            email: session.user.email,
            name: displayName,
            role: 'student',
            is_verified: true
          }, { onConflict: 'id' });
        }
      } catch (profileErr) {
        console.warn("Profile creation/check failed, but session exists. Continuing...", profileErr.message);
      }
      
      // If inside the modal iframe, tell parent page auth is done
      if (isInsideIframe) {
        window.top.postMessage({ type: 'YM_AUTH_COMPLETE' }, '*');
        return;
      }
      
      // If loaded as a full page (e.g. after Google OAuth redirect),
      // go back to home — supabase-auth.js on index will show avatar
      window.location.href = '/';
    }
  } catch(err) {
    console.error("Auth session check failed:", err.message);
  }
})();

async function doGoogle() {
  const btnText = document.getElementById('btnText');
  const googleIcon = document.getElementById('googleIcon');
  const btn = document.getElementById('googleBtn');
  
  btn.classList.add('loading');
  googleIcon.style.display = 'none';
  btnText.innerHTML = '<div class="spin"></div>';
  
  try {
    // After Google OAuth, user returns to /student-auth as a full page.
    // The auto-redirect IIFE above will detect the session and send them to /.
    const redirectUrl = new URL('/student-auth', window.location.origin).href;
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: redirectUrl }
    });
    if (error) throw error;
  } catch(err) {
    btn.classList.remove('loading');
    googleIcon.style.display = 'block';
    btnText.textContent = 'Continue with Google';
    showAlert('err', err.message || 'An error occurred during Google sign in.');
  }
}

function showAlert(type, msg) {
  const el = document.getElementById('alert');
  el.className = 'alert ' + (type === 'err' ? '' : 'ok');
  document.getElementById('alertIcon').textContent = type === 'err' ? '⚠️' : '✅';
  document.getElementById('alertMsg').textContent  = msg;
}

function hideAlert() { 
  document.getElementById('alert').className = 'alert hidden'; 
}
</script>
<script src="../shared/crisis-support.js"></script>

    <script src="/shared/ym-track.js"></script>
</body>
