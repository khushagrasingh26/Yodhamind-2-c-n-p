<head>

    <style>
        /* ── Design Tokens ── */
        :root {
            --primary: #7C5CBF;
            --accent: #56CFB2;
            --text: #2D2D2D;
            --soft: #F0EBF8;
            --text-light: #64748b;
            --glass-border: rgba(255, 255, 255, 0.5);
            --radius-btn: 50px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(180deg, var(--soft) 0%, #fff 100%);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ═══════════ NAVIGATION STYLES (Fixed & Inlined) ═══════════ */
        
        /* Topbar */
        .ym-topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .ym-topbar.scrolled {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .ym-topbar__logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--text);
            text-decoration: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ym-topbar__logo-icon {
            -webkit-text-fill-color: initial; /* Keeps emoji colored */
        }

        .ym-topbar__right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .ym-auth-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: var(--radius-btn);
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(124, 92, 191, 0.2);
        }

        .ym-auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 92, 191, 0.3);
        }

        /* Hamburger Button */
        .ym-topbar__hamburger {
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px;
            z-index: 1200; /* Above sidebar for closing */
        }

        .ym-topbar__hamburger span {
            display: block;
            width: 24px;
            height: 2.5px;
            background-color: var(--text);
            border-radius: 4px;
            transition: 0.3s;
        }

        /* Sidebar & Backdrop */
        .ym-sidebar-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(20, 15, 30, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1050;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .ym-sidebar-backdrop.open {
            opacity: 1;
            pointer-events: all;
        }

        .ym-sidebar {
            position: fixed;
            top: 0;
            left: -320px; /* Hidden by default */
            width: 300px;
            height: 100vh;
            background: white;
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.1);
            z-index: 1100;
            transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.05);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .ym-sidebar.open {
            left: 0; /* Slides in */
        }

        .ym-sidebar__header {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--primary);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 10px;
        }

        .ym-sidebar__nav {
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-grow: 1;
        }

        .ym-sidebar__section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-light);
            font-weight: 800;
            margin: 20px 0 8px 12px;
        }

        .ym-sidebar__link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 16px;
            transition: all 0.2s ease;
        }

        .ym-sidebar__link:hover {
            background: var(--soft);
            color: var(--primary);
            transform: translateX(4px);
        }

        .ym-sidebar__link.active {
            background: linear-gradient(135deg, rgba(124,92,191,0.1), rgba(86,207,178,0.1));
            color: var(--primary);
            font-weight: 700;
            border: 1px solid rgba(124,92,191,0.1);
        }

        .ym-sidebar__link-icon {
            font-size: 1.3rem;
            width: 24px;
            text-align: center;
        }

        .ym-sidebar__divider {
            height: 1px;
            background: rgba(0,0,0,0.05);
            margin: 12px 0;

        .ym-sidebar__footer {
            padding: 24px;
            font-size: 0.8rem;

            background: #fafafa;

            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .ym-sidebar__footer a:hover {
            color: var(--text);
        }

        /* ═══════════ BREATHING TOOL STYLES ═══════════ */
        
        .tool-layout-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 90px 20px 40px; /* Accounts for fixed topbar */
        }

        .breath-tool-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 32px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 40px 80px rgba(124, 92, 191, 0.15), inset 0 0 0 1px rgba(255,255,255,0.4);
            text-align: center;
        }

        .modal-header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
            padding-top: 10px;
        }

        .modal-header h3 {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text);
            margin: 0;
        }

        .sound-toggle {
            background: var(--soft);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: transform 0.2s, background 0.2s;
            display: grid;
            place-items: center;
            color: var(--text);
        }

        .sound-toggle:hover {
            transform: scale(1.1);
            background: #e2d9f3;
        }

        .tool-close-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--soft);
            color: var(--text);
            display: grid;
            place-items: center;
            text-decoration: none;
            font-size: 1.15rem;
            font-weight: 800;
            transition: transform 0.2s, background 0.2s;
            cursor: pointer;
        }

        .tool-close-btn:hover {
            transform: scale(1.1);
            background: #e2d9f3;
        }

        .breath-visual-container {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .breath-circle {
            width: 86px;
            height: 86px;
            position: relative;
            z-index: 2;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #modalSpiritCanvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes spiritAuraMorph {
            0% { border-radius: 55% 45% 48% 52% / 52% 48% 55% 45%; }
            50% { border-radius: 45% 55% 52% 48% / 48% 52% 45% 55%; }
            100% { border-radius: 55% 45% 48% 52% / 52% 48% 55% 45%; }
        }

        .breath-glow {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            background: linear-gradient(135deg, #56CFB2, #7C5CBF);
            filter: blur(20px);
            opacity: 0.4;
            z-index: 1;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s ease;
            animation: spiritAuraMorph 7s ease-in-out infinite reverse;
        }

        .breath-text {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 32px;
            min-height: 32px;
            transition: opacity 0.3s ease;
        }

        .breath-controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-cta {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            padding: 14px 28px;
            border-radius: var(--radius-btn);
            font-weight: 700;
            min-height: 48px;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            box-shadow: 0 8px 20px rgba(124, 92, 191, 0.25);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(124, 92, 191, 0.35);
        }

        .btn-cta:active {
            transform: scale(0.97);
        }

        .btn-secondary {
            border: none;
            background: transparent;
            color: var(--text-light);
            font-weight: 700;
            padding: 10px;
            cursor: pointer;
            border-radius: var(--radius-btn);
            transition: background 0.2s, color 0.2s;
        }

        .btn-secondary:hover {
            background: var(--soft);
            color: var(--text);
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .ym-topbar { padding: 0 16px; }
            .ym-topbar__logo { font-size: 1.2rem; }
            
            .tool-layout-wrapper { padding: 90px 16px 20px; }
            .breath-tool-card { padding: 32px 20px; border-radius: 28px; }
            .modal-header { margin-bottom: 30px; }
            .modal-header h3 { font-size: 1.25rem; }
            .breath-visual-container { width: 200px; height: 200px; margin-bottom: 30px; }
            .breath-circle { width: 76px; height: 76px; }
            #modalSpiritCanvas { width: 160px; height: 160px; }
            .breath-glow { width: 110px; height: 110px; }
            .breath-text { font-size: 1.15rem; margin-bottom: 24px; min-height: 28px; }
        }

        @media (max-height: 650px) {
            .tool-layout-wrapper { padding-top: 80px; }
            .breath-tool-card { padding: 24px 20px; }
            .modal-header { margin-bottom: 20px; }
            .breath-visual-container { width: 180px; height: 180px; margin-bottom: 20px; }
            .breath-circle { width: 70px; height: 70px; }
            #modalSpiritCanvas { width: 140px; height: 140px; }
            .breath-glow { width: 100px; height: 100px; }
            .breath-text { margin-bottom: 16px; font-size: 1.1rem; min-height: 26px; }
            .breath-controls { gap: 8px; }
            .breath-controls .btn-cta { min-height: 44px; padding: 10px 20px; }
        }
    </style>

    <script>
        /* ── Math helper for organic blob drawing ── */
        function drawBlob(ctx, cx, cy, baseR, fill, speed, complexity, t) {
            ctx.fillStyle = fill;
            ctx.beginPath();
            for (let i = 0; i <= Math.PI * 2; i += 0.1) {
                const r = baseR
                    + Math.sin(i * 3 + t * speed) * (5 * complexity)
                    + Math.cos(i * 5 - t * speed) * (5 * complexity)
                    + Math.sin(i * 7 + t) * (2 * complexity);
                const x = cx + Math.cos(i) * r;
                const y = cy + Math.sin(i) * r;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.closePath(); ctx.fill();
        }

        /* ── Element References ── */
        const startBreathBtn = document.getElementById('startBreathBtn');
        const patternBtn = document.getElementById('patternBtn');
        const breathText = document.getElementById('breathText');
        const breathCircle = document.getElementById('breathCircle');
        const breathGlow = document.getElementById('breathGlow');
        const soundToggle = document.getElementById('soundToggle');
        const toolCloseBtn = document.getElementById('toolCloseBtn');

        let isBreathing = false;
        let breathTimeout;
        let audioCtx, masterGain, synthFilter;
        let isSoundOn = false;

        /* ── Liquid Spirit Animation ── */
        const modalCanvas = document.getElementById('modalSpiritCanvas');
        const modalCtx = modalCanvas.getContext('2d');
        let modalTime = 0;
        let spiritState = 'default';
        let faceOffsetY = 0;
        let targetFaceOffset = 0;
        let isModalBlinking = false;
        let modalBlinkCountdown = 280;

        function animateModalSpirit() {
            const w = modalCanvas.width, h = modalCanvas.height;
            const cx = w / 2, cy = h / 2;
            
            modalCtx.clearRect(0, 0, w, h);

            function closeBreathingTool() {
                if (window.opener && !window.opener.closed) {
                    window.close();
                    return;
                }

                window.location.href = '/';
            }

            if (toolCloseBtn) {
                toolCloseBtn.addEventListener('click', closeBreathingTool);
            }
            modalTime += 0.015; // Slow, calm wobble

            // Base shadow
            modalCtx.shadowColor = 'rgba(124,92,191,0.35)'; 
            modalCtx.shadowBlur = 25;
            modalCtx.shadowOffsetY = 10;
            
            const body = modalCtx.createLinearGradient(cx - 80, cy - 80, cx + 80, cy + 80);
            body.addColorStop(0, '#56CFB2'); 
            body.addColorStop(1, '#7C5CBF');
            
            // Draw main body
            drawBlob(modalCtx, cx, cy, 88, body, 0.5, 0.4, modalTime);
            
            modalCtx.shadowBlur = 0;
            modalCtx.shadowOffsetY = 0;

            // Face Animation
            faceOffsetY += (targetFaceOffset - faceOffsetY) * 0.1;
            modalCtx.save();
            modalCtx.translate(0, faceOffsetY);
            modalCtx.fillStyle = 'white';
            modalCtx.strokeStyle = 'white';
            modalCtx.lineCap = 'round';
            modalCtx.lineJoin = 'round';

            modalBlinkCountdown--;
            if (modalBlinkCountdown <= 0 && spiritState === 'default') {
                isModalBlinking = true; 
                modalBlinkCountdown = Math.random() * 200 + 150;
                setTimeout(() => isModalBlinking = false, 150);
            }

            if (spiritState === 'inhale') {
                modalCtx.beginPath(); modalCtx.ellipse(cx - 30, cy - 12, 11, 17, 0, 0, Math.PI*2); modalCtx.fill();
                modalCtx.beginPath(); modalCtx.ellipse(cx + 30, cy - 12, 11, 17, 0, 0, Math.PI*2); modalCtx.fill();
                modalCtx.lineWidth = 3.5;
                modalCtx.beginPath(); modalCtx.arc(cx, cy + 14, 5, 0, Math.PI*2); modalCtx.stroke();
            } else if (spiritState === 'hold') {
                modalCtx.lineWidth = 4;
                modalCtx.beginPath(); modalCtx.moveTo(cx - 42, cy - 6); modalCtx.quadraticCurveTo(cx - 30, cy - 16, cx - 18, cy - 6); modalCtx.stroke();
                modalCtx.beginPath(); modalCtx.moveTo(cx + 18, cy - 6); modalCtx.quadraticCurveTo(cx + 30, cy - 16, cx + 42, cy - 6); modalCtx.stroke();
                
                modalCtx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                modalCtx.beginPath(); modalCtx.ellipse(cx - 44, cy + 6, 8, 4, 0, 0, Math.PI*2); modalCtx.fill();
                modalCtx.beginPath(); modalCtx.ellipse(cx + 44, cy + 6, 8, 4, 0, 0, Math.PI*2); modalCtx.fill();

                modalCtx.lineWidth = 3;
                modalCtx.beginPath(); modalCtx.arc(cx, cy + 6, 3, 0, Math.PI, false); modalCtx.stroke();
            } else if (spiritState === 'exhale') {
                modalCtx.lineWidth = 4;
                modalCtx.beginPath(); modalCtx.moveTo(cx - 40, cy - 12); modalCtx.quadraticCurveTo(cx - 30, cy - 4, cx - 20, cy - 12); modalCtx.stroke();
                modalCtx.beginPath(); modalCtx.moveTo(cx + 20, cy - 12); modalCtx.quadraticCurveTo(cx + 30, cy - 4, cx + 40, cy - 12); modalCtx.stroke();
                
                modalCtx.lineWidth = 3;
                modalCtx.beginPath(); modalCtx.arc(cx, cy + 12, 4, 0, Math.PI*2); modalCtx.stroke();
                
                modalCtx.lineWidth = 2.5;
                modalCtx.strokeStyle = `rgba(255, 255, 255, ${0.2 + 0.8 * Math.sin(modalTime * 8)})`;
                modalCtx.beginPath(); modalCtx.moveTo(cx, cy + 22); modalCtx.lineTo(cx, cy + 32); modalCtx.stroke();
            } else {
                if (!isModalBlinking) {
                    modalCtx.fillStyle = 'white';
                    modalCtx.beginPath(); modalCtx.ellipse(cx - 30, cy - 9, 9, 14, 0, 0, Math.PI * 2); modalCtx.fill();
                    modalCtx.beginPath(); modalCtx.ellipse(cx + 30, cy - 9, 9, 14, 0, 0, Math.PI * 2); modalCtx.fill();
                    
                    modalCtx.fillStyle = 'rgba(255,255,255,0.8)';
                    modalCtx.beginPath(); modalCtx.arc(cx - 25, cy - 14, 3.5, 0, Math.PI * 2); modalCtx.fill();
                    modalCtx.beginPath(); modalCtx.arc(cx + 35, cy - 14, 3.5, 0, Math.PI * 2); modalCtx.fill();
                } else {
                    modalCtx.lineWidth = 3.5;
                    modalCtx.beginPath(); modalCtx.moveTo(cx - 40, cy - 4); modalCtx.quadraticCurveTo(cx - 30, cy + 6, cx - 20, cy - 4); modalCtx.stroke();
                    modalCtx.beginPath(); modalCtx.moveTo(cx + 20, cy - 4); modalCtx.quadraticCurveTo(cx + 30, cy + 6, cx + 40, cy - 4); modalCtx.stroke();
                }
                modalCtx.strokeStyle = 'white';
                modalCtx.lineWidth = 2.5;
                modalCtx.beginPath(); modalCtx.moveTo(cx - 6, cy + 12); modalCtx.quadraticCurveTo(cx, cy + 16, cx + 6, cy + 12); modalCtx.stroke();
            }
            modalCtx.restore();

            // 3D Gloss
            modalCtx.save();
            drawBlob(modalCtx, cx, cy, 88, 'transparent', 0.5, 0.4, modalTime); 
            modalCtx.clip();
            const highlight = modalCtx.createRadialGradient(cx - 40, cy - 40, 0, cx, cy, 120);
            highlight.addColorStop(0, 'rgba(255, 255, 255, 0.45)');
            highlight.addColorStop(1, 'rgba(255, 255, 255, 0)');
            modalCtx.fillStyle = highlight;
            modalCtx.fill();
            modalCtx.restore();

            requestAnimationFrame(animateModalSpirit);
        }
        animateModalSpirit();

        // Audio Engine
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0;
                masterGain.connect(audioCtx.destination);

                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                osc1.type = 'sine'; osc2.type = 'sine';
                
                osc1.frequency.value = 174; 
                osc2.frequency.value = 178;

                synthFilter = audioCtx.createBiquadFilter();
                synthFilter.type = 'lowpass';
                synthFilter.frequency.value = 300;

                osc1.connect(synthFilter);
                osc2.connect(synthFilter);
                synthFilter.connect(masterGain);
                
                osc1.start(); osc2.start();
            }
        }

        soundToggle.addEventListener('click', () => {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            isSoundOn = !isSoundOn;
            soundToggle.textContent = isSoundOn ? '🔊' : '🔈';
            if (isSoundOn && isBreathing) {
                masterGain.gain.setTargetAtTime(0.15, audioCtx.currentTime, 1);
            } else if (!isSoundOn && masterGain) {
                masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 1);
            }
        });

        const sleep = ms => new Promise(r => { breathTimeout = setTimeout(r, ms); });

        async function startBreathingCycle() {
            if (isBreathing) return stopBreathing();
            isBreathing = true;
            startBreathBtn.textContent = 'Pause';

            if (isSoundOn && !audioCtx) initAudio();
            if (isSoundOn && audioCtx) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                masterGain.gain.setTargetAtTime(0.15, audioCtx.currentTime, 1);
            }

            try {
                while (isBreathing) {
                    // 1. INHALE (4s)
                    spiritState = 'inhale';
                    targetFaceOffset = -8;
                    breathText.style.opacity = '0';
                    await sleep(300);
                    if (!isBreathing) break;
                    breathText.textContent = 'Inhale...';
                    breathText.style.opacity = '1';

                    breathCircle.style.transition = 'transform 4s cubic-bezier(0.4, 0, 0.2, 1)';
                    breathGlow.style.transition = 'transform 4s cubic-bezier(0.4, 0, 0.2, 1), opacity 4s ease';
                    breathCircle.style.transform = 'scale(2.2)';
                    breathGlow.style.transform = 'scale(2.6)';
                    breathGlow.style.opacity = '0.8';

                    if (isSoundOn && synthFilter) synthFilter.frequency.setTargetAtTime(800, audioCtx.currentTime, 2);

                    await sleep(4000);
                    if (!isBreathing) break;

                    // 2. HOLD (4s)
                    spiritState = 'hold';
                    targetFaceOffset = -4;
                    breathText.style.opacity = '0';
                    await sleep(300);
                    if (!isBreathing) break;
                    breathText.textContent = 'Hold...';
                    breathText.style.opacity = '1';

                    breathCircle.style.transition = 'transform 4s linear';
                    breathCircle.style.transform = 'scale(2.25)';

                    await sleep(4000);
                    if (!isBreathing) break;

                    // 3. EXHALE (6s)
                    spiritState = 'exhale';
                    targetFaceOffset = 8;
                    breathText.style.opacity = '0';
                    await sleep(300);
                    if (!isBreathing) break;
                    breathText.textContent = 'Exhale...';
                    breathText.style.opacity = '1';

                    breathCircle.style.transition = 'transform 6s cubic-bezier(0.4, 0, 0.2, 1)';
                    breathGlow.style.transition = 'transform 6s cubic-bezier(0.4, 0, 0.2, 1), opacity 6s ease';
                    breathCircle.style.transform = 'scale(1)';
                    breathGlow.style.transform = 'scale(1)';
                    breathGlow.style.opacity = '0.3';

                    if (isSoundOn && synthFilter) synthFilter.frequency.setTargetAtTime(300, audioCtx.currentTime, 3);

                    await sleep(6000);
                }
            } catch (e) {}
        }

        function stopBreathing() {
            isBreathing = false;
            clearTimeout(breathTimeout);
            spiritState = 'default';
            targetFaceOffset = 0;
            startBreathBtn.textContent = 'Start 4-4-6 Breath';
            breathText.style.opacity = '0';
            
            setTimeout(() => {
                breathText.textContent = 'Ready when you are';
                breathText.style.opacity = '1';
            }, 300);

            breathCircle.style.transition = 'transform 1s cubic-bezier(0.4, 0, 0.2, 1)';
            breathGlow.style.transition = 'transform 1s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s ease';
            breathCircle.style.transform = 'scale(1)';
            breathGlow.style.transform = 'scale(1)';
            breathGlow.style.opacity = '0.3';

            if (masterGain) masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 1);
        }

        startBreathBtn.addEventListener('click', startBreathingCycle);
        patternBtn.addEventListener('click', () => {
            const patterns = ['4-7-8 Breath', 'Box Breathing', 'Balanced Breath'];
            const random = patterns[Math.floor(Math.random() * patterns.length)];
            startBreathBtn.textContent = `Start ${random}`;
        });
    </script>
    
    <!-- YodhaMind Shared Scripts -->
    <script>
      /* ── Sidebar toggle ── */
      (function() {
        var hamburger = document.getElementById('ymHamburger');
        var sidebar = document.getElementById('ymSidebar');
        var backdrop = document.getElementById('ymSidebarBackdrop');
        var topbar = document.getElementById('ymTopbar');

        function toggleSidebar() {
          var isOpen = sidebar.classList.contains('open');
          sidebar.classList.toggle('open');
          backdrop.classList.toggle('open');
          
          if(hamburger) {
            // Optional: Animate hamburger into an X
            var spans = hamburger.querySelectorAll('span');
            if(isOpen) {
              spans[0].style.transform = 'none';
              spans[1].style.opacity = '1';
              spans[2].style.transform = 'none';
            } else {
              spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
              spans[1].style.opacity = '0';
              spans[2].style.transform = 'rotate(-45deg) translate(4px, -4px)';
            }
          }
          document.body.style.overflow = isOpen ? '' : 'hidden';
        }

        if (hamburger) hamburger.addEventListener('click', toggleSidebar);
        if (backdrop) backdrop.addEventListener('click', toggleSidebar);

        /* ── Scroll shadow ── */
        if (topbar) {
          window.addEventListener('scroll', function() {
            topbar.classList.toggle('scrolled', window.scrollY > 10);
          }, { passive: true });
        }

        /* ── Highlight active sidebar link ── */
        var currentPath = window.location.pathname;
        document.querySelectorAll('.ym-sidebar__link').forEach(function(link) {
          var href = link.getAttribute('href');
          if (href === currentPath || (href !== '/' && currentPath.indexOf(href) === 0)) {
            link.classList.add('active');
          }
        });
      })();
    </script>
