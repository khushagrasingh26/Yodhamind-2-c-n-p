<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Untangle - YodhaMind Cognitive Training</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* Premium Dark Theme */
            --bg-start: #0f172a;
            --bg-end: #020617;
            --primary: #6366f1;
            --safe: #2dd4bf;
            --danger: #fb7185;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;

            /* Enhanced Glassmorphism */
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.12);
            --blur-md: blur(12px);
            --blur-lg: blur(24px);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            margin: 0;
            padding: 0;
        }

        body {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: radial-gradient(circle at center, var(--bg-start), var(--bg-end));
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
            outline: none;
            will-change: transform;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
        }

        canvas:active {
            cursor: grabbing;
        }

        /* --- UI Layers & Glass Panels --- */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
            z-index: 10;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        .hud-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--blur-md);
            -webkit-backdrop-filter: var(--blur-md);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .level-badge {
            padding: 10px 24px;
            border-radius: 100px;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .hud-text {
            padding: 8px 18px;
            border-radius: 100px;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-main);
            align-self: flex-start;
            transition: all 0.3s ease;
        }

        /* --- Controls --- */
        .top-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            pointer-events: auto;
        }

        .btn-icon,
        .btn-top {
            background: var(--glass-bg);
            backdrop-filter: var(--blur-md);
            -webkit-backdrop-filter: var(--blur-md);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            /* Keeps the link tags clean */
        }

        .btn-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.1rem;
        }

        .btn-top {
            padding: 0 20px;
            height: 44px;
            border-radius: 100px;
            gap: 8px;
            font-family: inherit;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .btn-icon:hover,
        .btn-top:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: var(--glass-highlight);
        }

        .btn-icon:active,
        .btn-top:active {
            transform: scale(0.95);
        }

        .btn-icon.muted {
            color: var(--danger);
            border-color: rgba(251, 113, 133, 0.3);
        }

        /* --- Overlays & Modals --- */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: var(--blur-lg);
            -webkit-backdrop-filter: var(--blur-lg);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.5s ease, visibility 0s linear 0.5s;
            padding: 24px;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transition: opacity 0.5s ease, visibility 0s linear 0s;
        }

        .modal-content {
            max-width: 500px;
            width: 100%;
            padding: 48px 32px;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translateY(20px);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .overlay.active .modal-content {
            transform: translateY(0);
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 16px 0;
            background: linear-gradient(135deg, var(--text-main), var(--text-muted));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--text-main);
        }

        p {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 32px;
            font-weight: 400;
        }

        /* --- Stats --- */
        .stats-container {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            width: 100%;
            justify-content: center;
        }

        .stat-box {
            flex: 1;
            max-width: 140px;
            padding: 16px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-box span {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .stat-box strong {
            font-size: 1.8rem;
            color: var(--text-main);
            font-weight: 700;
        }

        /* --- Action Buttons --- */
        .btn-group {
            display: flex;
            gap: 16px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary,
        .btn-secondary {
            padding: 16px 32px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 100px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--text-main);
            color: var(--bg-end);
            border: none;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.2);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--glass-highlight);
        }

        .btn-primary:active,
        .btn-secondary:active {
            transform: scale(0.96);
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            h1 {
                font-size: 2.2rem;
            }

            .modal-content {
                padding: 32px 20px;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
            }

            .btn-text {
                display: none;
            }

            .btn-top {
                padding: 0;
                width: 44px;
                justify-content: center;
            }

            .ui-layer {
                padding: max(16px, env(safe-area-inset-top)) 16px 16px 16px;
            }
        }
    </style>
</head>

<body>

    <div id="game-container">
        <canvas id="canvas"></canvas>

        <!-- HUD -->
        <div class="ui-layer">
            <div class="top-bar">
                <div class="hud-group">
                    <div class="level-badge" id="level-indicator">Level 1</div>
                    <div class="hud-text glass-panel" id="hud-crossings">Initializing Environment...</div>
                </div>

                <div class="top-controls">
                    <!-- Distraction-free controls: Audio, Home, and Exit strictly -->
                    <button class="btn-icon" id="btn-sound" aria-label="Toggle Sound"><i
                            class="fas fa-volume-up"></i></button>
                    <a href="/" class="btn-top" aria-label="Return Home"><i class="fas fa-home"></i> <span
                            class="btn-text">Home</span></a>
                    <button class="btn-top" id="btn-exit" aria-label="Exit Session"><i class="fas fa-sign-out-alt"></i>
                        <span class="btn-text">Exit</span></button>
                </div>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="overlay active">
            <div class="modal-content glass-panel">
                <div style="font-size: 3rem; margin-bottom: 16px; color: var(--primary);"><i
                        class="fa-solid fa-network-wired"></i></div>
                <h1>Cognitive Untangle</h1>
                <p>Train your sustained attention and spatial working memory. Drag the nodes to restructure the grid
                    until no neural pathways intersect.</p>
                <button class="btn-primary" id="btn-start" style="width: 100%;">Initialize Session</button>
            </div>
        </div>

        <!-- Level Complete Screen -->
        <div id="complete-screen" class="overlay">
            <div class="modal-content glass-panel">
                <div style="font-size: 3rem; margin-bottom: 16px; color: var(--safe);"><i
                        class="fa-solid fa-check-circle"></i></div>
                <h2>Pathways Optimized</h2>
                <p id="affirmation-text">Cognitive load resolved efficiently.</p>

                <div class="stats-container" id="stats-container">
                    <div class="stat-box glass-panel">
                        <span>Duration</span>
                        <strong id="stat-time">0:00</strong>
                    </div>
                    <div class="stat-box glass-panel">
                        <span>Moves</span>
                        <strong id="stat-moves">0</strong>
                    </div>
                </div>

                <div class="btn-group">
                    <button class="btn-primary" id="btn-next">Next Structure <i class="fas fa-arrow-right"></i></button>
                    <button class="btn-secondary" id="btn-share"><i class="fas fa-share-nodes"></i> Share
                        Metrics</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * AUDIO ENGINE
         */
        class AudioEngine {
            constructor() {
                this.ctx = null;
                this.masterGain = null;
                this.isMuted = false;
                this.initialized = false;
            }
            init() {
                if (!window.AudioContext && !window.webkitAudioContext || this.initialized) return;
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.ctx.createGain();
                    this.masterGain.gain.value = 0.2;
                    this.masterGain.connect(this.ctx.destination);
                    this.initialized = true;
                    this.resume();
                } catch (e) { console.warn("Audio init failed", e); }
            }
            resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume().catch(() => { }); }
            toggleMute() {
                this.isMuted = !this.isMuted;
                if (this.masterGain) this.masterGain.gain.setTargetAtTime(this.isMuted ? 0 : 0.2, this.ctx.currentTime, 0.1);
                return this.isMuted;
            }
            playTone(freq, type = 'sine', duration = 0.2, vol = 0.2) {
                if (this.isMuted || !this.ctx) return;
                this.resume();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                osc.type = type;
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start(); osc.stop(this.ctx.currentTime + duration);
            }
            playGrab() { this.playTone(440, 'sine', 0.15, 0.1); }
            playRelease() { this.playTone(523.25, 'sine', 0.2, 0.1); }
            playWin() {
                [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => setTimeout(() => this.playTone(f, 'triangle', 1.0, 0.1), i * 100));
            }
        }

        /**
         * SAVE MANAGER
         */
        class SaveManager {
            constructor() { this.key = 'yodhamind_untangle_v2'; }
            save(state) { try { localStorage.setItem(this.key, JSON.stringify(state)); } catch (e) { } }
            load() { try { return JSON.parse(localStorage.getItem(this.key)); } catch (e) { return null; } }
        }

        /**
         * MATH/GEO UTILS
         */
        const GEO = {
            intersect: (p1, q1, p2, q2) => {
                if (p1 === p2 || p1 === q2 || q1 === p2 || q1 === q2) return false;
                const ccw = (a, b, c) => (c.y - a.y) * (b.x - a.x) > (b.y - a.y) * (c.x - a.x);
                return ccw(p1, p2, q2) !== ccw(q1, p2, q2) && ccw(p1, q1, p2) !== ccw(p1, q1, q2);
            },
            distSq: (p1, p2) => (p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2,
            lerp: (start, end, amt) => (1 - amt) * start + amt * end
        };

        /**
         * MAIN GAME ENGINE
         */
        class Game {
            constructor() {
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d', { alpha: false }); // High performance

                this.audio = new AudioEngine();
                this.saveManager = new SaveManager();

                this.level = parseInt(localStorage.getItem('untangle_level')) || 1;
                this.streak = parseInt(localStorage.getItem('untangle_streak')) || 0;

                this.colors = {
                    bg: '#0f172a',
                    node: '#f8fafc',
                    safeLine: '#2dd4bf',
                    safeGlow: 'rgba(45, 212, 191, 0.2)',
                    dangerLine: '#fb7185',
                    dangerGlow: 'rgba(251, 113, 133, 0.2)'
                };

                this.nodeRadius = 14;
                this.hitRadius = 45;
                this.nodes = [];
                this.edges = [];
                this.draggingNode = null;
                this.pointer = { x: 0, y: 0, isDown: false };

                this.moves = 0;
                this.startTime = 0;
                this.lastCrossedCount = -1;
                this.isComplete = false;

                this.affirmations = [
                    "Cognitive load resolved efficiently.",
                    "Spatial reasoning patterns verified.",
                    "Neural pathways optimally mapped.",
                    "Sustained attention parameters met.",
                    "Complex structure decoupled successfully."
                ];

                this.initDOM();
                this.resize();
                this.setupEvents();

                requestAnimationFrame((t) => this.render(t));
            }

            initDOM() {
                const state = this.saveManager.load();
                const btn = document.getElementById('btn-start');

                // Setup initial start button logic
                if (state) {
                    btn.textContent = "Resume Session";
                    btn.onclick = () => {
                        this.audio.init();
                        this.hideModal('start-screen');
                        this.restore(state);
                    };
                } else {
                    btn.onclick = () => {
                        this.audio.init();
                        this.hideModal('start-screen');
                        this.loadLevel(this.level);
                    };
                }

                document.getElementById('btn-next').onclick = () => {
                    this.hideModal('complete-screen');
                    this.loadLevel(this.level + 1);
                };

                document.getElementById('btn-exit').onclick = () => {
                    window.location.href = "/games";
                };

                document.getElementById('btn-sound').onclick = (e) => {
                    this.audio.init();
                    const muted = this.audio.toggleMute();
                    e.currentTarget.classList.toggle('muted', muted);
                    e.currentTarget.innerHTML = muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
                };

                document.getElementById('btn-share').onclick = (e) => {
                    const txt = `Analyzed and optimized Level ${this.level} on YodhaMind Cognitive Training in ${document.getElementById('stat-time').innerText} (${this.moves} moves). 🧠⚡`;
                    if (navigator.share) {
                        navigator.share({ text: txt }).catch(() => { });
                    } else {
                        navigator.clipboard.writeText(txt);
                        e.currentTarget.innerHTML = '<i class="fas fa-check"></i> Copied';
                        setTimeout(() => e.currentTarget.innerHTML = '<i class="fas fa-share-nodes"></i> Share Metrics', 2000);
                    }
                };
            }

            hideModal(id) { document.getElementById(id).classList.remove('active'); }
            showModal(id) { document.getElementById(id).classList.add('active'); }

            resize() {
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                this.canvas.width = this.width * dpr;
                this.canvas.height = this.height * dpr;
                this.ctx.resetTransform();
                this.ctx.scale(dpr, dpr);

                if (this.nodes.length) {
                    const pad = 40;
                    this.nodes.forEach(n => {
                        n.x = Math.max(pad, Math.min(this.width - pad, n.u * this.width));
                        n.y = Math.max(pad, Math.min(this.height - pad, n.v * this.height));
                    });
                }
            }

            setupEvents() {
                window.addEventListener('resize', () => this.resize());

                const getEvtPos = (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    return { x: clientX - rect.left, y: clientY - rect.top };
                };

                const onDown = (e) => {
                    if (this.isComplete) return;
                    this.audio.resume();
                    this.pointer.isDown = true;
                    const pos = getEvtPos(e);
                    this.pointer.x = pos.x; this.pointer.y = pos.y;

                    let closest = null, minD = this.hitRadius ** 2;
                    for (let n of this.nodes) {
                        const d = GEO.distSq(pos, n);
                        if (d < minD) { closest = n; minD = d; }
                    }
                    if (closest) {
                        this.draggingNode = closest;
                        this.audio.playGrab();
                    }
                };

                const onMove = (e) => {
                    if (!this.pointer.isDown) return;
                    const pos = getEvtPos(e);
                    this.pointer.x = pos.x; this.pointer.y = pos.y;
                };

                const onUp = () => {
                    this.pointer.isDown = false;
                    if (this.draggingNode) {
                        this.moves++;
                        this.draggingNode = null;
                        this.audio.playRelease();
                        this.checkSolution();
                        if (!this.isComplete) this.save();
                    }
                };

                this.canvas.addEventListener('mousedown', onDown);
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onUp);
                this.canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onDown(e); }, { passive: false });
                this.canvas.addEventListener('touchmove', (e) => { e.preventDefault(); onMove(e); }, { passive: false });
                window.addEventListener('touchend', onUp);
            }

            loadLevel(lvl) {
                this.level = lvl;
                localStorage.setItem('untangle_level', lvl);
                this.isComplete = false;
                this.moves = 0;
                this.startTime = Date.now();
                this.nodes = [];
                this.edges = [];

                const count = Math.min(5 + Math.floor(lvl * 0.7), 16);
                const cx = this.width / 2, cy = this.height / 2;
                const radius = Math.min(cx, cy) * 0.6;

                // Position nodes in a circle
                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * Math.PI * 2;
                    this.nodes.push({ id: i, x: cx + Math.cos(angle) * radius, y: cy + Math.sin(angle) * radius });
                }

                // Add perimeter edges
                for (let i = 0; i < count; i++) {
                    this.edges.push({ a: i, b: (i + 1) % count });
                }

                // Fix for the Infinite Loop: Add interior chords mathematically safely
                // A convex polygon with 'count' vertices can have at most (count - 3) non-crossing diagonals
                let maxExtras = count - 3;
                let extras = Math.max(1, Math.min(maxExtras, Math.floor(count * 0.5)));
                let attempts = 0;

                while (extras > 0 && attempts < 150) {
                    attempts++;
                    const a = Math.floor(Math.random() * count);
                    const b = Math.floor(Math.random() * count);

                    // Check validity: not same point, not adjacent points
                    if (a !== b && Math.abs(a - b) !== 1 && Math.abs(a - b) !== count - 1) {
                        // Check if edge already exists
                        if (!this.edges.some(e => (e.a === a && e.b === b) || (e.a === b && e.b === a))) {
                            let safe = true;
                            // Ensure the new edge doesn't intersect existing edges
                            for (let e of this.edges) {
                                if (GEO.intersect(this.nodes[a], this.nodes[b], this.nodes[e.a], this.nodes[e.b])) {
                                    safe = false;
                                    break;
                                }
                            }
                            if (safe) {
                                this.edges.push({ a, b });
                                extras--;
                            }
                        }
                    }
                }

                this.scramble();
                this.updateUValues();
                this.updateHUD();
                this.save();
            }

            scramble() {
                const pad = 60, safeW = this.width - pad * 2, safeH = this.height - pad * 2;
                for (let a = 0; a < 40; a++) {
                    this.nodes.forEach(n => { n.x = pad + Math.random() * safeW; n.y = pad + Math.random() * safeH; });
                    this.calcCrossings();
                    if (this.edges.filter(e => e.isCrossed).length >= Math.max(2, Math.floor(this.edges.length * 0.4))) break;
                }
            }

            updateUValues() { this.nodes.forEach(n => { n.u = n.x / this.width; n.v = n.y / this.height; }); }

            calcCrossings() {
                this.edges.forEach(e => e.isCrossed = false);
                let found = false;
                for (let i = 0; i < this.edges.length; i++) {
                    for (let j = i + 1; j < this.edges.length; j++) {
                        if (GEO.intersect(this.nodes[this.edges[i].a], this.nodes[this.edges[i].b], this.nodes[this.edges[j].a], this.nodes[this.edges[j].b])) {
                            this.edges[i].isCrossed = this.edges[j].isCrossed = found = true;
                        }
                    }
                }
                return found;
            }

            checkSolution() {
                if (!this.calcCrossings() && !this.isComplete) {
                    this.isComplete = true;
                    this.audio.playWin();
                    this.streak++;
                    localStorage.setItem('untangle_streak', this.streak);

                    const timeSec = Math.floor((Date.now() - this.startTime) / 1000);
                    document.getElementById('stat-time').innerText = `${Math.floor(timeSec / 60)}:${(timeSec % 60).toString().padStart(2, '0')}`;
                    document.getElementById('stat-moves').innerText = this.moves;
                    document.getElementById('affirmation-text').innerText = this.affirmations[Math.floor(Math.random() * this.affirmations.length)];

                    setTimeout(() => this.showModal('complete-screen'), 1000);
                }
            }

            save() {
                this.saveManager.save({
                    lvl: this.level,
                    moves: this.moves,
                    time: Date.now() - this.startTime,
                    nodes: this.nodes.map(n => ({ id: n.id, u: n.u, v: n.v })),
                    edges: this.edges.map(e => ({ a: e.a, b: e.b }))
                });
            }

            restore(s) {
                this.level = s.lvl;
                this.moves = s.moves;
                this.startTime = Date.now() - s.time;
                this.nodes = s.nodes.map(n => ({ id: n.id, u: n.u, v: n.v, x: n.u * this.width, y: n.v * this.height }));
                this.edges = s.edges.map(e => ({ a: e.a, b: e.b }));
                this.calcCrossings();
                this.updateHUD();
            }

            updateHUD() {
                document.getElementById('level-indicator').innerText = `Level ${this.level}` + (this.streak > 0 ? ` · 🔥 ${this.streak}` : '');
            }

            render() {
                if (this.draggingNode) {
                    const pad = this.nodeRadius + 10;
                    this.draggingNode.x = GEO.lerp(this.draggingNode.x, Math.max(pad, Math.min(this.width - pad, this.pointer.x)), 0.4);
                    this.draggingNode.y = GEO.lerp(this.draggingNode.y, Math.max(pad, Math.min(this.height - pad, this.pointer.y)), 0.4);
                    this.updateUValues();
                    this.calcCrossings();
                }

                const crosses = this.edges.filter(e => e.isCrossed).length;
                if (this.lastCrossedCount !== crosses && !document.getElementById('start-screen').classList.contains('active')) {
                    this.lastCrossedCount = crosses;
                    const hud = document.getElementById('hud-crossings');
                    if (crosses === 0 && !this.isComplete) {
                        hud.innerHTML = `<span style="color: var(--safe)">✓ Network Optimized</span>`;
                        hud.style.borderColor = 'var(--safe)';
                    } else if (crosses > 0) {
                        hud.innerHTML = `<span style="color: var(--danger)">⚠ ${crosses} active conflicts</span>`;
                        hud.style.borderColor = 'var(--glass-border)';
                    }
                }

                this.ctx.fillStyle = this.colors.bg;
                this.ctx.fillRect(0, 0, this.width, this.height);

                this.ctx.lineCap = 'round';
                this.ctx.lineWidth = 10;
                this.edges.forEach(e => {
                    this.ctx.strokeStyle = e.isCrossed ? this.colors.dangerGlow : this.colors.safeGlow;
                    this.ctx.beginPath();
                    this.ctx.moveTo(this.nodes[e.a].x, this.nodes[e.a].y);
                    this.ctx.lineTo(this.nodes[e.b].x, this.nodes[e.b].y);
                    this.ctx.stroke();
                });

                this.ctx.lineWidth = 2;
                this.edges.forEach(e => {
                    this.ctx.strokeStyle = e.isCrossed ? this.colors.dangerLine : this.colors.safeLine;
                    this.ctx.beginPath();
                    this.ctx.moveTo(this.nodes[e.a].x, this.nodes[e.a].y);
                    this.ctx.lineTo(this.nodes[e.b].x, this.nodes[e.b].y);
                    this.ctx.stroke();
                });

                this.nodes.forEach(n => {
                    const isSafe = this.edges.filter(e => e.a === n.id || e.b === n.id).every(e => !e.isCrossed);

                    this.ctx.beginPath();
                    this.ctx.arc(n.x, n.y, (n === this.draggingNode) ? this.nodeRadius * 1.3 : this.nodeRadius, 0, Math.PI * 2);
                    this.ctx.fillStyle = isSafe ? this.colors.safeLine : this.colors.node;
                    this.ctx.fill();

                    this.ctx.lineWidth = 3;
                    this.ctx.strokeStyle = this.colors.bg;
                    this.ctx.beginPath();
                    this.ctx.arc(n.x, n.y, this.nodeRadius - 4, 0, Math.PI * 2);
                    this.ctx.stroke();
                });

                requestAnimationFrame((t) => this.render(t));
            }
        }

        // Safer Initialization to ensure DOM is fully loaded before JS engine executes
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => new Game());
        } else {
            new Game();
        }
    </script>
</body>

</html>
