<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yodha Echoes - Sonic Therapy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        /* ═══════════ YODHAMIND TOKENS & THEME ═══════════ */
        :root {
            --ym-primary: #667eea;
            --ym-secondary: #764ba2;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            /* Dark Theme Base */
            --bg-deep: #0f172a;
            --bg-glow: radial-gradient(circle at 50% 50%, rgba(102, 126, 234, 0.15) 0%, rgba(15, 23, 42, 0) 70%);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);

            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-glow: #a78bfa;
            --radar-beam: rgba(167, 139, 250, 0.25);
            --node-active: #c4b5fd;
            --danger-color: #e53e3e;
        }

        :root[data-theme="light"] {
            --bg-deep: #f4f7fe;
            --bg-glow: radial-gradient(circle at 50% 50%, rgba(102, 126, 234, 0.15) 0%, rgba(244, 247, 254, 0) 70%);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(148, 163, 184, 0.2);
            --glass-shadow: 0 8px 32px rgba(148, 163, 184, 0.15);

            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-glow: #667eea;
            --radar-beam: rgba(102, 126, 234, 0.2);
            --node-active: #667eea;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            background-image: var(--bg-glow);
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            overscroll-behavior-y: none;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* ═══════════ NAVIGATION UI ═══════════ */
        nav {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 25px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            box-shadow: var(--glass-shadow);
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
            position: fixed;
            top: 0;
            width: 100%;
        }

        .nav-left {
            display: flex;
            gap: 10px;
            justify-content: flex-start;
        }

        .nav-center {
            display: flex;
            justify-content: center;
        }

        .nav-right {
            display: flex;
            justify-content: flex-end;
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-nav {
            background: transparent;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            color: var(--text-main);
            padding: 8px 16px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            text-decoration: none;
        }

        .btn-nav:hover {
            background: rgba(148, 163, 184, 0.1);
            transform: translateY(-2px);
        }

        .btn-exit {
            color: var(--danger-color);
            border-color: rgba(229, 62, 62, 0.3);
        }

        .btn-exit:hover {
            background: rgba(229, 62, 62, 0.1);
            border-color: rgba(229, 62, 62, 0.5);
        }

        /* ═══════════ ECHOES APP UI ═══════════ */
        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
            width: 100%;
            margin-top: 60px;
            /* Offset for top nav */
        }

        .echo-circle-wrapper {
            position: relative;
            width: min(85vw, 60vh, 500px);
            height: min(85vw, 60vh, 500px);
            border-radius: 50%;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: var(--glass-shadow), inset 0 0 60px rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .echo-circle-wrapper::after {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 50%;
            border: 1px solid var(--accent-glow);
            opacity: 0;
            pointer-events: none;
        }

        .echo-circle-wrapper.pulse-active::after {
            opacity: 0.4;
            transform: scale(1.02);
            transition: 0s;
        }

        canvas {
            border-radius: 50%;
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: pointer;
            z-index: 10;
        }

        .status-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.95rem;
            font-weight: 300;
            color: var(--text-muted);
            pointer-events: none;
            text-align: center;
            opacity: 0.8;
            transition: opacity 0.6s ease;
            letter-spacing: 0.5px;
            line-height: 1.6;
            z-index: 5;
        }

        /* Apple-Inspired Toolbar */
        .toolbar {
            position: absolute;
            bottom: 30px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            justify-content: center;
            gap: 25px;
            align-items: center;
            z-index: 50;
            box-shadow: var(--glass-shadow);
        }

        .tool-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            padding: 5px;
        }

        .tool-btn:hover {
            color: var(--text-main);
            transform: translateY(-2px);
        }

        .tool-btn.active {
            color: var(--accent-glow);
        }

        .icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon svg {
            width: 100%;
            height: 100%;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tool-label {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Sliders */
        .sliders-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-left: 20px;
            border-left: 1px solid var(--glass-border);
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="range"] {
            width: 120px;
            height: 4px;
            background: rgba(148, 163, 184, 0.3);
            border-radius: 4px;
            appearance: none;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        /* Start Overlay */
        .start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-deep);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            text-align: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .start-title {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .start-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 40px;
            font-weight: 300;
            max-width: 320px;
            line-height: 1.6;
        }

        .start-btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 14px 45px;
            border-radius: 30px;
            font-weight: 500;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        /* Mobile Breakpoints */
        @media (max-width: 700px) {
            nav {
                padding: 12px 15px;
            }

            .btn-nav span {
                display: none;
            }

            .btn-nav {
                padding: 8px;
                border-radius: 50%;
            }

            .logo {
                font-size: 1rem;
            }

            .logo svg {
                width: 16px;
                height: 16px;
            }

            .toolbar {
                bottom: 20px;
                padding: 10px 20px;
                gap: 15px;
                border-radius: 20px;
                flex-wrap: wrap;
                width: 90%;
                max-width: 350px;
            }

            .sliders-container {
                width: 100%;
                border-left: none;
                border-top: 1px solid var(--glass-border);
                padding: 12px 0 0 0;
                align-items: center;
            }

            input[type="range"] {
                width: 160px;
            }
        }
    </style>
</head>

<body>

    <!-- ═══════════ NAVIGATION ═══════════ -->
    <nav>
        <div class="nav-left">
            <!-- Home Button -->
            <a href="/" class="btn-nav" title="Back to Home">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Home</span>
            </a>
            <!-- Exit Button -->
            <a href="/games" class="btn-nav btn-exit" title="Exit to Mind Gym">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Exit</span>
            </a>
        </div>

        <div class="nav-center">
            <a href="/" class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#667eea" />
                            <stop offset="100%" stop-color="#764ba2" />
                        </linearGradient>
                    </defs>
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
                YodhaMind
            </a>
        </div>

        <div class="nav-right">
            <!-- Theme Toggle -->
            <button class="btn-nav" id="ymThemeToggleBtn" type="button" title="Toggle Theme">
                <span id="zenIcon">☀️</span>
                <span id="zenText">Light Mode</span>
            </button>
        </div>
    </nav>

    <!-- ═══════════ ECHOES APP ═══════════ -->
    <div class="app-container">

        <div class="echo-circle-wrapper" id="circleWrapper">
            <canvas id="musicCanvas"></canvas>
            <div class="status-text" id="statusText">
                Tap to place a thought.<br>Listen as it echoes.
            </div>
        </div>

        <div class="toolbar">
            <button class="tool-btn active" id="playBtn" onclick="togglePlay()">
                <div class="icon" id="playIcon">
                    <svg viewBox="0 0 24 24">
                        <rect x="6" y="4" width="4" height="16"></rect>
                        <rect x="14" y="4" width="4" height="16"></rect>
                    </svg>
                </div>
                <span class="tool-label" id="playLabel">Pause</span>
            </button>

            <button class="tool-btn" onclick="clearSky()">
                <div class="icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                    </svg>
                </div>
                <span class="tool-label">Clear</span>
            </button>

            <button class="tool-btn" onclick="randomizeSky()">
                <div class="icon">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z">
                        </path>
                    </svg>
                </div>
                <span class="tool-label">Generate</span>
            </button>

            <div class="sliders-container">
                <!-- Volume Slider -->
                <div class="slider-group">
                    <div class="icon" style="width: 14px; height: 14px; color: var(--text-muted);" title="Volume">
                        <svg viewBox="0 0 24 24">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                        </svg>
                    </div>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.6">
                </div>
                <!-- Tempo Slider -->
                <div class="slider-group">
                    <div class="icon" style="width: 14px; height: 14px; color: var(--text-muted);" title="Speed">
                        <svg viewBox="0 0 24 24">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                        </svg>
                    </div>
                    <input type="range" id="speedSlider" min="0.005" max="0.03" step="0.001" value="0.012">
                </div>
            </div>
        </div>

        <div class="start-overlay" id="startOverlay">
            <h2 class="start-title">Yodha Echoes</h2>
            <p class="start-subtitle">Create harmonic ripples to center your mind and train auditory focus.</p>
            <button class="start-btn" onclick="startEngine()">Enter the Realm</button>
        </div>

    </div>

    <!-- ═══════════ JAVASCRIPT LOGIC ═══════════ -->
    <script>
        // --- 1. UI & Theme Logic ---
        const themeBtn = document.getElementById('ymThemeToggleBtn');

        function updateThemeUI(theme) {
            const zenIcon = document.getElementById('zenIcon');
            const zenText = document.getElementById('zenText');
            if (theme === 'dark') {
                zenIcon.innerText = '☀️';
                if (zenText) zenText.innerText = 'Light Mode';
            } else {
                zenIcon.innerText = '🌙';
                if (zenText) zenText.innerText = 'Zen Mode';
            }
        }

        updateThemeUI('dark');

        themeBtn.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            updateThemeUI(next);

            if (!isPlaying) renderFrame();
        });


        // --- 2. Echoes Engine (Audio & Canvas) ---
        const canvas = document.getElementById('musicCanvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('circleWrapper');

        const SCALE = [
            130.81, 146.83, 164.81, 196.00, 220.00,
            261.63, 293.66, 329.63, 392.00, 440.00,
            523.25, 587.33, 659.26, 783.99, 880.00, 1046.50
        ];

        let nodes = [], angle = 0, speed = 0.012, isPlaying = false;
        let audioCtx, masterGain, delayNode, feedbackGain;
        let cssWidth, cssHeight, centerX, centerY, radius, animationId;

        function init() {
            resize();
            window.addEventListener('resize', resize);
            canvas.addEventListener('mousedown', handlePointerDown);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handlePointerDown(e.touches[0]); }, { passive: false });
            canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

            // Slider Listeners
            document.getElementById('speedSlider').addEventListener('input', (e) => speed = parseFloat(e.target.value));

            document.getElementById('volumeSlider').addEventListener('input', (e) => {
                if (masterGain && audioCtx) {
                    // Smooth volume transition to prevent clicking
                    masterGain.gain.setTargetAtTime(parseFloat(e.target.value), audioCtx.currentTime, 0.05);
                }
            });

            document.addEventListener('visibilitychange', () => {
                if (document.hidden && isPlaying) cancelAnimationFrame(animationId);
                else if (!document.hidden && isPlaying) animationId = requestAnimationFrame(animate);
            });
            renderFrame();
        }

        function resize() {
            const rect = wrapper.getBoundingClientRect();
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            cssWidth = rect.width; cssHeight = rect.height;
            canvas.width = cssWidth * dpr; canvas.height = cssHeight * dpr;
            ctx.scale(dpr, dpr);
            centerX = cssWidth / 2; centerY = cssHeight / 2; radius = (cssWidth / 2) - 2;
            if (!isPlaying) renderFrame();
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                // Set initial volume based on the slider's current state
                masterGain.gain.value = parseFloat(document.getElementById('volumeSlider').value);
                masterGain.connect(audioCtx.destination);

                delayNode = audioCtx.createDelay(); delayNode.delayTime.value = 0.45;
                feedbackGain = audioCtx.createGain(); feedbackGain.gain.value = 0.35;

                delayNode.connect(feedbackGain); feedbackGain.connect(delayNode); delayNode.connect(masterGain);
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function startEngine() {
            const overlay = document.getElementById('startOverlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.visibility = 'hidden', 800);
            initAudio(); isPlaying = true; animate();
        }

        function playTone(node) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const dist = Math.sqrt(Math.pow(node.x - centerX, 2) + Math.pow(node.y - centerY, 2));
            const index = Math.floor(Math.max(0, Math.min(1, dist / radius)) * (SCALE.length - 1));

            osc.type = 'sine'; osc.frequency.setValueAtTime(SCALE[index], audioCtx.currentTime);
            const now = audioCtx.currentTime;
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.3, now + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);

            osc.connect(gain); gain.connect(masterGain); gain.connect(delayNode);
            osc.start(now); osc.stop(now + 1.5);
            node.active = 1.0;

            wrapper.classList.remove('pulse-active');
            void wrapper.offsetWidth;
            wrapper.classList.add('pulse-active');
        }

        function handlePointerDown(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX !== undefined ? e.clientX : e.touches[0].clientX) - rect.left;
            const y = (e.clientY !== undefined ? e.clientY : e.touches[0].clientY) - rect.top;
            if (Math.sqrt(Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2)) > radius) return;

            document.getElementById('statusText').style.opacity = '0';
            nodes.push({ x: x, y: y, angle: Math.atan2(y - centerY, x - centerX), active: 0 });
            if (audioCtx) playTone(nodes[nodes.length - 1]);
            if (!isPlaying) renderFrame();
        }

        function clearSky() { nodes = []; document.getElementById('statusText').style.opacity = '0.8'; if (!isPlaying) renderFrame(); }

        function randomizeSky() {
            nodes = []; document.getElementById('statusText').style.opacity = '0';
            for (let i = 0; i < 7; i++) {
                const r = (Math.random() * 0.7 + 0.1) * radius;
                const a = Math.random() * Math.PI * 2;
                nodes.push({ x: centerX + Math.cos(a) * r, y: centerY + Math.sin(a) * r, angle: a, active: 0 });
            }
            if (!isPlaying) renderFrame();
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('playBtn'), icon = document.getElementById('playIcon'), label = document.getElementById('playLabel');
            if (isPlaying) {
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                btn.classList.add('active');
                icon.innerHTML = '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>';
                label.innerText = 'Pause'; animate();
            } else {
                btn.classList.remove('active');
                icon.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
                label.innerText = 'Play';
            }
        }

        function renderFrame() {
            ctx.clearRect(0, 0, cssWidth, cssHeight);
            const radarX = centerX + Math.cos(angle) * radius, radarY = centerY + Math.sin(angle) * radius;

            ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.arc(centerX, centerY, radius, angle - 0.4, angle); ctx.lineTo(centerX, centerY);
            const beamColor = getComputedStyle(document.documentElement).getPropertyValue('--radar-beam').trim();
            const sweepGrad = ctx.createLinearGradient(centerX, centerY, radarX, radarY);
            sweepGrad.addColorStop(0, 'transparent'); sweepGrad.addColorStop(1, beamColor);
            ctx.fillStyle = sweepGrad; ctx.fill();

            ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.lineTo(radarX, radarY);
            ctx.strokeStyle = beamColor; ctx.lineWidth = 1.5; ctx.stroke();

            ctx.beginPath(); ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim(); ctx.fill();

            const activeColor = getComputedStyle(document.documentElement).getPropertyValue('--node-active').trim();
            const baseColor = getComputedStyle(document.documentElement).getPropertyValue('--text-main').trim();

            nodes.forEach(node => {
                ctx.beginPath(); ctx.arc(node.x, node.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = baseColor; ctx.shadowBlur = 10; ctx.shadowColor = activeColor; ctx.fill(); ctx.shadowBlur = 0;

                if (node.active > 0) {
                    ctx.beginPath(); ctx.arc(node.x, node.y, 4 + (1 - node.active) * 35, 0, Math.PI * 2);
                    ctx.strokeStyle = activeColor.replace('rgb', 'rgba').replace(')', `, ${node.active})`);
                    if (ctx.strokeStyle === activeColor) { ctx.globalAlpha = node.active; ctx.strokeStyle = activeColor; }
                    ctx.lineWidth = 1.5; ctx.stroke(); ctx.globalAlpha = 1.0;
                    node.active -= 0.025;
                }
            });
        }

        function animate() {
            if (!isPlaying) return;
            const prevAngle = angle; angle += speed;
            if (angle > Math.PI * 2) angle -= Math.PI * 2;

            nodes.forEach(node => {
                let nodeA = node.angle < 0 ? node.angle + Math.PI * 2 : node.angle;
                let currentA = angle < prevAngle ? angle + Math.PI * 2 : angle;
                let prevA = prevAngle;
                if (nodeA < prevA) nodeA += Math.PI * 2;
                if (nodeA >= prevA && nodeA < currentA) playTone(node);
            });
            renderFrame();
            animationId = requestAnimationFrame(animate);
        }

        setTimeout(init, 0);
    </script>
</body>

</html>
