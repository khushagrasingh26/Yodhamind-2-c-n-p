<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Matrix</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Space+Grotesk:wght@400;500;600;700&display=swap");

        :root {
            --bg-base: #050810;
            --panel: rgba(13, 18, 30, 0.65);
            --panel-border: rgba(148, 163, 184, 0.15);
            --text: #f1f5f9;
            --muted: #94a3b8;
            --accent: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.4);
            --accent-2: #ff0055;
            --ok: #10b981;
            --warn: #f59e0b;
            --fail: #ef4444;
            --tile: rgba(255, 255, 255, 0.03);
            --tile-hover: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        /* Lock the body strictly to the viewport size */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            /* Fallback */
            height: 100dvh;
            /* Dynamic viewport height for mobile */
            overflow: hidden;
            /* Absolutely no scrolling */
            font-family: "Space Grotesk", "Segoe UI", Tahoma, sans-serif;
            color: var(--text);
            background-color: var(--bg-base);
            background-image:
                radial-gradient(circle at 50% 0%, rgba(0, 240, 255, 0.15) 0%, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            background-position: center top, center center, center center;
            /* Prevent pull-to-refresh on mobile */
            overscroll-behavior-y: none;
        }

        .page {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* --- Topbar --- */
        .topbar {
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(5, 8, 16, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--panel-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
        }

        .topbar h2 {
            margin: 0;
            font-size: clamp(1rem, 3vw, 1.2rem);
            letter-spacing: 1px;
            font-weight: 700;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-size: clamp(0.7rem, 2vw, 0.85rem);
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* --- Stage & Shell --- */
        .stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(8px, 2vh, 20px);
            overflow: hidden;
        }

        .shell {
            width: min(520px, 100%);
            max-height: 100%;
            background: var(--panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: clamp(16px, 3vh, 32px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .shell.shake {
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
            border-color: rgba(239, 68, 68, 0.5);
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.2), inset 0 0 20px rgba(239, 68, 68, 0.1);
        }

        #game-ui {
            display: flex;
            flex-direction: column;
            gap: clamp(12px, 2vh, 24px);
            /* Scales gaps down on short screens */
        }

        /* --- Typography --- */
        .headline {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .eyebrow {
            margin: 0 0 4px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.65rem;
            color: var(--accent);
            font-weight: 700;
        }

        .headline h1 {
            margin: 0 0 4px 0;
            font-size: clamp(1.4rem, 4vw, 2.2rem);
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        .hint {
            margin: 0;
            color: var(--muted);
            font-size: clamp(0.85rem, 2vw, 0.95rem);
        }

        /* --- Status Indicators --- */
        .status-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 10px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 10px currentColor;
        }

        .status-pill[data-state="watch"] {
            color: var(--accent);
            border-color: var(--accent-glow);
            background: rgba(0, 240, 255, 0.05);
        }

        .status-pill[data-state="play"] {
            color: var(--warn);
            border-color: rgba(245, 158, 11, 0.4);
            background: rgba(245, 158, 11, 0.05);
        }

        .status-pill[data-state="ok"] {
            color: var(--ok);
            border-color: rgba(16, 185, 129, 0.4);
            background: rgba(16, 185, 129, 0.05);
        }

        .status-pill[data-state="fail"] {
            color: var(--fail);
            border-color: rgba(239, 68, 68, 0.4);
            background: rgba(239, 68, 68, 0.05);
        }

        /* --- Meta Cards --- */
        .meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: clamp(10px, 2vw, 16px);
        }

        .meta-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: clamp(8px, 1.5vh, 12px);
            color: var(--muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .meta-card span {
            display: block;
            color: var(--text);
            font-size: clamp(1.2rem, 3vh, 1.5rem);
            margin-top: 4px;
            font-weight: 700;
        }

        /* --- Game Grid --- */
        #grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(8px, 1.5vh, 14px);
            /* The magic line that forces the grid to shrink on short screens */
            width: min(100%, 380px, 42dvh);
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: clamp(10px, 2vh, 16px);
            border-radius: 20px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .tile {
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tile-idle {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 3px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .tile-idle:active:not(:disabled) {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }

        .tile-active {
            background: var(--accent);
            border: 1px solid #fff;
            transform: translateY(2px);
            box-shadow: 0 0 15px var(--accent-glow), inset 0 0 15px rgba(255, 255, 255, 0.8);
            border-bottom-width: 1px;
            z-index: 2;
        }

        .tile:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        /* --- Result Screen --- */
        .result {
            display: none;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        .result.show {
            display: block;
        }

        .result h3 {
            margin: 0;
            font-size: clamp(1.5rem, 4vw, 2rem);
            color: var(--fail);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .result #final-level {
            font-size: clamp(2.5rem, 6vw, 4rem);
            margin: 5px 0;
            font-weight: 700;
            color: var(--text);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .subtle {
            color: var(--muted);
            margin: 5px 0 20px;
            font-size: clamp(0.9rem, 2vw, 1rem);
        }

        .btn-primary {
            border: 0;
            width: 100%;
            padding: clamp(12px, 2vh, 16px);
            border-radius: 12px;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            color: #000;
            background: linear-gradient(135deg, var(--accent), #00a2ff);
            box-shadow: 0 10px 25px var(--accent-glow);
            transition: all 0.2s ease;
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .hidden {
            display: none !important;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-2px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(4px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-6px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(6px, 0, 0);
            }
        }

        /* Responsive behavior for very narrow screens (e.g. older iPhones) */
        @media (max-width: 400px) {
            .headline {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }

            .headline-copy {
                align-items: center;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <header class="topbar">
            <button id="resetBtn" class="btn" type="button">↺ Reset</button>
            <h2>Memory Matrix</h2>
            <a href="../pages/games.html" class="btn">✕ Exit</a>
        </header>

        <main class="stage">
            <section class="shell">
                <div id="game-ui">
                    <div class="headline">
                        <div class="headline-copy">
                            <p class="eyebrow">System Active</p>
                            <h1>Memory Matrix</h1>
                            <p class="hint">Replicate the sequence precisely.</p>
                        </div>
                        <div class="status-pill" id="status-pill" data-state="watch">
                            <span class="status-dot"></span>
                            <span id="status-display">Watch...</span>
                        </div>
                    </div>

                    <div class="meta">
                        <div class="meta-card">Current Level<span id="level-display">1</span></div>
                        <div class="meta-card">Highest Node<span id="best-display">1</span></div>
                    </div>

                    <div id="grid"></div>
                </div>

                <div id="result-screen" class="result">
                    <h3>Connection Lost</h3>
                    <div id="final-level">Level 1</div>
                    <p class="subtle">Sequence broken. Rebooting required.</p>
                    <button id="tryAgainBtn" class="btn-primary" type="button">Initialize Reboot</button>
                </div>
            </section>
        </main>
    </div>

    <script>
        let level = 1;
        let sequence = [];
        let playerStep = 0;
        let isShowing = false;
        let gameOver = false;
        let activeTimeouts = [];

        const gridEl = document.getElementById('grid');
        const levelDisplay = document.getElementById('level-display');
        const statusDisplay = document.getElementById('status-display');
        const statusPill = document.getElementById('status-pill');
        const bestDisplay = document.getElementById('best-display');
        const gameUI = document.getElementById('game-ui');
        const resultScreen = document.getElementById('result-screen');
        const finalLevelDisplay = document.getElementById('final-level');
        const resetBtn = document.getElementById('resetBtn');
        const tryAgainBtn = document.getElementById('tryAgainBtn');
        const shellEl = document.querySelector('.shell');

        const bestKey = 'memoryMatrixBest';
        let bestLevel = Number(window.localStorage.getItem(bestKey)) || 1;

        function setStatus(label, state) {
            statusDisplay.innerText = label;
            statusPill.dataset.state = state;
        }

        function syncBest(levelValue) {
            if (levelValue > bestLevel) {
                bestLevel = levelValue;
                window.localStorage.setItem(bestKey, String(bestLevel));
            }
            bestDisplay.innerText = bestLevel;
        }

        function queueTimeout(callback, delay) {
            const id = window.setTimeout(() => {
                activeTimeouts = activeTimeouts.filter((t) => t !== id);
                callback();
            }, delay);
            activeTimeouts.push(id);
            return id;
        }

        function clearQueuedTimeouts() {
            activeTimeouts.forEach((id) => window.clearTimeout(id));
            activeTimeouts = [];
        }

        const tiles = [];
        for (let i = 0; i < 9; i++) {
            const btn = document.createElement('button');
            btn.className = 'tile tile-idle';
            btn.setAttribute('type', 'button');
            btn.onclick = () => handleTileClick(i);
            gridEl.appendChild(btn);
            tiles.push(btn);
        }

        function setTileActive(index, isActive) {
            if (isActive) {
                tiles[index].classList.remove('tile-idle');
                tiles[index].classList.add('tile-active');
            } else {
                tiles[index].classList.remove('tile-active');
                tiles[index].classList.add('tile-idle');
            }
        }

        function resetTileVisuals() {
            tiles.forEach((tile) => {
                tile.classList.remove('tile-active');
                tile.classList.add('tile-idle');
            });
        }

        function setTilesDisabled(disabled) {
            tiles.forEach((tile) => { tile.disabled = disabled; });
        }

        function startLevel(currentLevel) {
            clearQueuedTimeouts();
            gameOver = false;
            playerStep = 0;
            isShowing = true;
            setTilesDisabled(true);
            resetTileVisuals();

            levelDisplay.innerText = currentLevel;
            setStatus('Watch...', 'watch');
            syncBest(currentLevel);

            const newSeqLength = currentLevel + 2;
            sequence = Array.from({ length: newSeqLength }, () => Math.floor(Math.random() * 9));

            let i = 0;
            const playNext = () => {
                if (i >= sequence.length) {
                    isShowing = false;
                    setTilesDisabled(false);
                    setStatus('Repeat!', 'play');
                    return;
                }

                setTileActive(sequence[i], true);

                queueTimeout(() => {
                    setTileActive(sequence[i], false);
                    queueTimeout(() => {
                        i++;
                        playNext();
                    }, 180);
                }, 420);
            };

            queueTimeout(playNext, 700);
        }

        function handleTileClick(index) {
            if (isShowing || gameOver) return;

            setTileActive(index, true);
            queueTimeout(() => setTileActive(index, false), 170);

            if (index === sequence[playerStep]) {
                if (playerStep + 1 === sequence.length) {
                    setTilesDisabled(true);
                    setStatus('Correct!', 'ok');
                    queueTimeout(() => {
                        level++;
                        startLevel(level);
                    }, 650);
                } else {
                    playerStep++;
                }
            } else {
                endGame();
            }
        }

        function endGame() {
            clearQueuedTimeouts();
            gameOver = true;
            isShowing = false;
            resetTileVisuals();
            setTilesDisabled(true);

            shellEl.classList.add('shake');

            gameUI.classList.add('hidden');
            resultScreen.classList.add('show');
            finalLevelDisplay.innerText = `Level ${level}`;
            setStatus('Pattern broken', 'fail');
            syncBest(level);
        }

        function resetGame() {
            clearQueuedTimeouts();
            level = 1;
            sequence = [];
            playerStep = 0;
            isShowing = false;
            gameOver = false;

            shellEl.classList.remove('shake');
            resetTileVisuals();
            gameUI.classList.remove('hidden');
            resultScreen.classList.remove('show');
            syncBest(level);
            startLevel(level);
        }

        resetBtn.addEventListener('click', resetGame);
        tryAgainBtn.addEventListener('click', resetGame);

        window.addEventListener('DOMContentLoaded', () => {
            resetGame();
        });
    </script>
    <script src="../shared/game-sound-toggle.js"></script>
    <script src="../shared/crisis-support.js"></script>
</body>

</html>
