<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yodha Aura - Energy Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        /* ═══════════ YODHAMIND TOKENS & THEME ═══════════ */
        :root {
            --ym-primary: #667eea;
            --ym-secondary: #764ba2;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            /* Dark Theme Base */
            --bg-deep: #0f172a;
            --bg-glow: radial-gradient(circle at 50% 50%, rgba(102, 126, 234, 0.15) 0%, rgba(15, 23, 42, 0) 70%);
            --trail-bg: rgba(15, 23, 42, 0.25);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);

            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-glow: #a78bfa;
            --particle-base: #8b5cf6;
            --particle-repel: #38bdf8;
            --particle-attract: #fcd34d;
            --danger-color: #e53e3e;
        }

        :root[data-theme="light"] {
            --bg-deep: #f4f7fe;
            --bg-glow: radial-gradient(circle at 50% 50%, rgba(102, 126, 234, 0.15) 0%, rgba(244, 247, 254, 0) 70%);
            --trail-bg: rgba(244, 247, 254, 0.35);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(148, 163, 184, 0.2);
            --glass-shadow: 0 8px 32px rgba(148, 163, 184, 0.15);

            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-glow: #667eea;
            --particle-base: #667eea;
            --particle-repel: #0ea5e9;
            --particle-attract: #eab308;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            background-image: var(--bg-glow);
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            overscroll-behavior-y: none;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* ═══════════ NAVIGATION UI ═══════════ */
        nav {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 25px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            box-shadow: var(--glass-shadow);
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
            position: fixed;
            top: 0;
            width: 100%;
        }

        .nav-left {
            display: flex;
            gap: 10px;
            justify-content: flex-start;
        }

        .nav-center {
            display: flex;
            justify-content: center;
        }

        .nav-right {
            display: flex;
            justify-content: flex-end;
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-nav {
            background: transparent;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            color: var(--text-main);
            padding: 8px 16px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            text-decoration: none;
        }

        .btn-nav:hover {
            background: rgba(148, 163, 184, 0.1);
            transform: translateY(-2px);
        }

        .btn-exit {
            color: var(--danger-color);
            border-color: rgba(229, 62, 62, 0.3);
        }

        .btn-exit:hover {
            background: rgba(229, 62, 62, 0.1);
            border-color: rgba(229, 62, 62, 0.5);
        }

        /* ═══════════ APP UI ═══════════ */
        .app-container {
            position: fixed;
            top: 60px;
            /* Below nav */
            left: 0;
            width: 100vw;
            height: calc(100vh - 60px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: crosshair;
        }

        .instruction {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 20;
            animation: fadeOut 3s forwards 2.5s;
        }

        .instruction h2 {
            font-weight: 400;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .instruction p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* Apple-Inspired Toolbar */
        .toolbar {
            position: absolute;
            bottom: 30px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            z-index: 50;
            box-shadow: var(--glass-shadow);
        }

        .tool-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            padding: 5px;
            min-width: 60px;
        }

        .tool-btn:hover {
            color: var(--text-main);
            transform: translateY(-2px);
        }

        .tool-btn.active {
            color: var(--accent-glow);
        }

        .icon {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon svg {
            width: 100%;
            height: 100%;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tool-label {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Sliders */
        .sliders-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-left: 20px;
            border-left: 1px solid var(--glass-border);
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="range"] {
            width: 100px;
            height: 4px;
            background: rgba(148, 163, 184, 0.3);
            border-radius: 4px;
            appearance: none;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        /* Start Overlay */
        .start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-deep);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            text-align: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .start-title {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .start-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 40px;
            font-weight: 300;
            max-width: 320px;
            line-height: 1.6;
        }

        .start-btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 14px 45px;
            border-radius: 30px;
            font-weight: 500;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        /* Mobile Breakpoints */
        @media (max-width: 700px) {
            nav {
                padding: 12px 15px;
            }

            .btn-nav span {
                display: none;
            }

            .btn-nav {
                padding: 8px;
                border-radius: 50%;
            }

            .logo {
                font-size: 1rem;
            }

            .logo svg {
                width: 16px;
                height: 16px;
            }

            .toolbar {
                bottom: 20px;
                padding: 10px 15px;
                gap: 10px;
                border-radius: 20px;
                flex-wrap: wrap;
                width: 92%;
                max-width: 380px;
            }

            .tool-btn {
                min-width: 50px;
            }

            .sliders-container {
                width: 100%;
                border-left: none;
                border-top: 1px solid var(--glass-border);
                padding: 12px 0 0 0;
                align-items: center;
                flex-direction: row;
                justify-content: space-around;
            }

            input[type="range"] {
                width: 110px;
            }
        }
    </style>
</head>

<body>

    <!-- ═══════════ NAVIGATION ═══════════ -->
    <nav>
        <div class="nav-left">
            <a href="/" class="btn-nav" title="Back to Home">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>

                    <defs>

    <!-- ═══════════ APP ═══════════ -->
    <div class="app-container">
        <canvas id="auraCanvas"></canvas>

        <div class="instruction">
            <h2>Shape the Energy</h2>
            <p>Guide the aura with your touch</p>
        </div>

        <div class="toolbar">
            <button class="tool-btn active" id="btnRepel" onclick="setMode('repel')">
                <div class="icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M21 3l-6 6"></path>

            <button class="tool-btn" id="btnCalm" onclick="setMode('calm')">

                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"></circle>

                        <line x1="9" y1="9" x2="9.01" y2="9"></line>

            <div class="sliders-container">

        <div class="start-overlay" id="startOverlay">
            <h2 class="start-title">Yodha Aura</h2>

            <button class="start-btn" onclick="startEngine()">Begin Journey</button>

    <!-- ═══════════ JAVASCRIPT LOGIC ═══════════ -->
    <script>
        // --- 1. UI & Theme Logic ---
        const themeBtn = document.getElementById('ymThemeToggleBtn');

        function updateThemeUI(theme) {
            const zenIcon = document.getElementById('zenIcon');
            const zenText = document.getElementById('zenText');
            if (theme === 'dark') {
                zenIcon.innerText = '☀️';
                if (zenText) zenText.innerText = 'Light Mode';
            } else {
                zenIcon.innerText = '🌙';
                if (zenText) zenText.innerText = 'Zen Mode';
            }
        }
        updateThemeUI('dark'); // Default

        themeBtn.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            updateThemeUI(next);
        });

        // --- 2. Physics & Graphics Engine ---
        const canvas = document.getElementById('auraCanvas');
        const ctx = canvas.getContext('2d');

        const IS_MOBILE = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const PIXEL_RATIO = Math.min(window.devicePixelRatio || 1, 2);
        const PARTICLE_COUNT = IS_MOBILE ? 200 : 450;
        const CONNECT_DIST = 70;
        const MOUSE_RADIUS = IS_MOBILE ? 120 : 200;

        let width, height;
        let particles = [];
        let mouse = { x: -1000, y: -1000, active: false };
        let mode = 'repel'; // 'repel', 'attract', 'calm'
        let simulationSpeed = 0.5;
        let isRunning = false;
        let animationId;

        // Audio System
        let audioCtx, masterGain, droneOsc, filterNode, lfo;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();

                masterGain = audioCtx.createGain();
                masterGain.gain.value = parseFloat(document.getElementById('volumeSlider').value);
                masterGain.connect(audioCtx.destination);

                // Deep resonant filter
                filterNode = audioCtx.createBiquadFilter();
                filterNode.type = 'lowpass';
                filterNode.frequency.value = 200;
                filterNode.Q.value = 5;
                filterNode.connect(masterGain);

                // Base Drone (Binaural feel)
                droneOsc = audioCtx.createOscillator();
                droneOsc.type = 'triangle';
                droneOsc.frequency.value = 85;

                // LFO for slow volume swelling (breathing effect)
                lfo = audioCtx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.1; // 10 second cycle
                const lfoGain = audioCtx.createGain();
                lfoGain.gain.value = 0.3;

                lfo.connect(lfoGain);
                droneOsc.connect(lfoGain);
                lfoGain.connect(filterNode);

                droneOsc.start();
                lfo.start();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        class Particle {
            constructor() { this.init(); }

            init() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                this.size = (Math.random() * 2 + 1.5) * (IS_MOBILE ? 0.8 : 1);

                // Colors will be fetched dynamically in draw to support theme switching
                this.colorAlpha = Math.random() * 0.5 + 0.3;
            }

            update() {
                if (mode !== 'calm' && mouse.active) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const distSq = dx * dx + dy * dy;
                    const radSq = MOUSE_RADIUS * MOUSE_RADIUS * PIXEL_RATIO * PIXEL_RATIO;

                    if (distSq < radSq) {
                        const dist = Math.sqrt(distSq);
                        const force = (MOUSE_RADIUS * PIXEL_RATIO - dist) / (MOUSE_RADIUS * PIXEL_RATIO);
                        const dirX = dx / dist;
                        const dirY = dy / dist;

                        if (mode === 'repel') {
                            this.vx -= dirX * force * 1.5;
                            this.vy -= dirY * force * 1.5;
                            this.state = 'repel';
                        } else if (mode === 'attract') {
                            this.vx += dirX * force * 1.2;
                            this.vy += dirY * force * 1.2;
                            this.state = 'attract';
                        }
                    } else {
                        this.state = 'base';
                    }
                } else {
                    this.state = 'base';
                    if (mode === 'calm') {
                        this.vx *= 0.92;
                        this.vy *= 0.92;
                    }
                }

                // Apply physics
                this.x += this.vx * simulationSpeed;
                this.y += this.vy * simulationSpeed;

                // Bounce off walls
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;

                // Ambient drift
                if (mode === 'calm') {
                    this.x += (Math.random() - 0.5) * 0.3;
                    this.y += (Math.random() - 0.5) * 0.3;
                } else {
                    if (Math.abs(this.vx) < 0.2) this.vx += (Math.random() - 0.5) * 0.1;
                    if (Math.abs(this.vy) < 0.2) this.vy += (Math.random() - 0.5) * 0.1;
                }

                this.vx *= 0.98; // Friction
                this.vy *= 0.98;
            }

            draw(baseCol, repelCol, attractCol) {
                let targetCol = baseCol;
                if (this.state === 'repel') targetCol = repelCol;
                if (this.state === 'attract') targetCol = attractCol;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);

                ctx.fillStyle = targetCol;
                ctx.shadowBlur = 15;
                ctx.shadowColor = targetCol;

                ctx.fill();
                ctx.shadowBlur = 0; // Reset for performance
            }
        }

        function initEngine() {
            resize();
            window.addEventListener('resize', resize);

            // Mouse
            canvas.addEventListener('mousemove', e => updatePointer(e.clientX, e.clientY));
            canvas.addEventListener('mouseleave', () => mouse.active = false);
            canvas.addEventListener('mousedown', pulseInteraction);

            // Touch
            canvas.addEventListener('touchstart', e => {
                e.preventDefault();
                updatePointer(e.touches[0].clientX, e.touches[0].clientY);
                pulseInteraction();
            }, { passive: false });
            canvas.addEventListener('touchmove', e => {
                e.preventDefault();
                updatePointer(e.touches[0].clientX, e.touches[0].clientY);
            }, { passive: false });
            canvas.addEventListener('touchend', () => mouse.active = false);

            // Controls
            document.getElementById('speedSlider').addEventListener('input', e => simulationSpeed = parseFloat(e.target.value));
            document.getElementById('volumeSlider').addEventListener('input', e => {
                if (masterGain) masterGain.gain.setTargetAtTime(parseFloat(e.target.value), audioCtx.currentTime, 0.05);
            });

            // Visibility
            document.addEventListener('visibilitychange', () => {
                if (document.hidden && isRunning) cancelAnimationFrame(animationId);
                else if (!document.hidden && isRunning) animationId = requestAnimationFrame(loop);
            });

            // Populate Particles
            for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
        }

        function updatePointer(cx, cy) {
            const r = canvas.getBoundingClientRect();
            mouse.x = (cx - r.left) * (width / r.width);
            mouse.y = (cy - r.top) * (height / r.height);
            mouse.active = true;
        }

        function resize() {
            const r = canvas.parentElement.getBoundingClientRect();
            canvas.style.width = r.width + "px";
            canvas.style.height = r.height + "px";
            width = canvas.width = r.width * PIXEL_RATIO;
            height = canvas.height = r.height * PIXEL_RATIO;
        }

        // Global function for UI buttons
        window.setMode = function (m) {
            mode = m;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            if (m === 'repel') document.getElementById('btnRepel').classList.add('active');
            if (m === 'attract') document.getElementById('btnAttract').classList.add('active');
            if (m === 'calm') document.getElementById('btnCalm').classList.add('active');
        };

        window.startEngine = function () {
            document.getElementById('startOverlay').style.opacity = '0';
            setTimeout(() => document.getElementById('startOverlay').style.visibility = 'hidden', 800);
            initAudio();
            if (!isRunning) {
                isRunning = true;
                initEngine();
                loop();
            }
        };

        function pulseInteraction() {
            if (!mouse.active) return;
            // Quick burst of energy on tap/click
            particles.forEach(p => {
                const dx = p.x - mouse.x;
                const dy = p.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200 * PIXEL_RATIO) {
                    const force = (200 * PIXEL_RATIO - dist) / (200 * PIXEL_RATIO);
                    p.vx += (dx / dist) * force * (mode === 'attract' ? -15 : 15);
                    p.vy += (dy / dist) * force * (mode === 'attract' ? -15 : 15);
                }
            });
        }

        function loop() {
            // Get Theme Colors
            const style = getComputedStyle(document.documentElement);
            const trailBg = style.getPropertyValue('--trail-bg').trim();
            const colBase = style.getPropertyValue('--particle-base').trim();
            const colRepel = style.getPropertyValue('--particle-repel').trim();
            const colAttract = style.getPropertyValue('--particle-attract').trim();
            const lineCol = colBase.replace(')', ', 0.15)').replace('rgb', 'rgba'); // Hacky but works for hex/rgb

            // Trails effect
            ctx.fillStyle = trailBg;
            ctx.fillRect(0, 0, width, height);

            let totalSpeed = 0;

            // Draw Connections
            ctx.strokeStyle = lineCol;
            ctx.lineWidth = 1 * PIXEL_RATIO;

            const connectLimitSq = (CONNECT_DIST * PIXEL_RATIO) * (CONNECT_DIST * PIXEL_RATIO);
            const mouseRange = 250 * PIXEL_RATIO;

            for (let i = 0; i < particles.length; i++) {
                const p1 = particles[i];
                p1.update();
                p1.draw(colBase, colRepel, colAttract);

                totalSpeed += Math.abs(p1.vx) + Math.abs(p1.vy);

                if (mode !== 'calm' && mouse.active) {
                    if (Math.abs(p1.x - mouse.x) > mouseRange || Math.abs(p1.y - mouse.y) > mouseRange) continue;

                    for (let j = i + 1; j < particles.length; j++) {
                        const p2 = particles[j];
                        const dx = p1.x - p2.x;
                        const dy = p1.y - p2.y;

                        if (dx * dx + dy * dy < connectLimitSq) {
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    }
                }
            }

            // Audio Modulation based on average particle speed and mouse pos
            if (filterNode && droneOsc && mouse.active) {
                const avgSpeed = totalSpeed / particles.length;
                const targetCutoff = 100 + (avgSpeed * 200);
                filterNode.frequency.setTargetAtTime(Math.min(targetCutoff, 2000), audioCtx.currentTime, 0.2);

                // Slight pitch bend based on horizontal mouse pos
                const pitchShift = ((mouse.x / width) - 0.5) * 10;
                droneOsc.frequency.setTargetAtTime(85 + pitchShift, audioCtx.currentTime, 0.5);
            } else if (filterNode) {
                // Relax filter when calm
                filterNode.frequency.setTargetAtTime(150, audioCtx.currentTime, 1.0);
            }

            animationId = requestAnimationFrame(loop);
        }

    </script>
</body>

</html>
